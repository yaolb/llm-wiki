<!DOCTYPE html><html><body><h1>Glob Test</h1><pre id="out">Loading...</pre>
<script type="module">
const modules = import.meta.glob('../../wiki/**/*.md', { query: '?raw', import: 'default', eager: true });
const keys = Object.keys(modules);
document.getElementById('out').textContent = JSON.stringify({
  count: keys.length,
  files: keys.map(k => k.replace(/.*\/wiki\//, 'wiki/')),
  hasIndex: !!modules['../../wiki/index.md'],
}, null, 2);
</script></body></html>
