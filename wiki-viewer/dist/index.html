<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Wiki</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --surface: #fef9f0;
        --surface-light: #f8f0e0;
        --surface-hover: #efe0cc;
        --accent: #b45309;
        --text-primary: #3d3529;
        --text-secondary: #6b5e4a;
        --text-muted: #9b8c7a;
        --border: #e0d5c0;
        --green: #16a34a;
        --blue: #2563eb;
        --amber: #d97706;
        --purple: #7c3aed;
      }
      html, body, #root { height: 100%; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--surface);
        color: var(--text-primary);
        font-size: 14px;
      }
      button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      pre, code { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

      /* Layout */
      .app { display: flex; flex-direction: column; height: 100%; }
      .main-area { display: flex; flex: 1; overflow: hidden; }
      .mobile-header { display: none; }
      @media (max-width: 1023px) {
        .mobile-header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--surface-light); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sidebar-desktop { display: none !important; }
        .status-bar { display: none !important; }
      }

      /* Sidebar */
      .sidebar {
        width: 288px; height: 100%; background: var(--surface-light);
        border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;
      }
      .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
      .sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
      .sidebar-header p { font-size: 11px; color: var(--text-muted); }
      .sidebar-search { padding: 8px 12px; }
      .sidebar-search button {
        width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
        border-radius: 8px; background: var(--surface); color: var(--text-secondary);
        border: 1px solid var(--border); font-size: 13px; transition: border-color 0.15s;
      }
      .sidebar-search button:hover { border-color: var(--accent); color: var(--text-primary); }
      .sidebar-search kbd { margin-left: auto; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--surface-hover); color: var(--text-muted); }
      .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 8px; }
      .sidebar-footer { padding: 8px 12px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); }

      /* Category */
      .cat-btn {
        width: 100%; display: flex; align-items: center; gap: 6px; padding: 6px 8px;
        font-size: 13px; font-weight: 500; color: var(--text-secondary); border-radius: 8px; transition: all 0.15s;
      }
      .cat-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
      .cat-btn .arrow { font-size: 10px; transition: transform 0.15s; width: 12px; text-align: center; }
      .cat-btn .arrow.open { transform: rotate(90deg); }
      .cat-btn .count { margin-left: auto; font-size: 10px; color: var(--text-muted); }
      .cat-pages { margin-left: 12px; margin-top: 2px; }
      .cat-pages .page-btn {
        width: 100%; text-align: left; padding: 6px 8px; font-size: 12px; border-radius: 8px;
        color: var(--text-secondary); transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .cat-pages .page-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
      .cat-pages .page-btn.active { background: var(--accent); color: #fff; font-weight: 500; }
      .cat-pages .page-btn.active:hover { background: var(--accent); opacity: 0.9; }

      /* Content */
      .content { flex: 1; overflow-y: auto; }
      .content-inner { max-width: 720px; margin: 0 auto; padding: 32px; }
      .content-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); }
      .content-empty svg { margin-bottom: 16px; opacity: 0.3; }

      /* Metadata */
      .meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
      .meta-type { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; }
      .meta-type.entity { background: #2563eb18; color: var(--blue); }
      .meta-type.concept { background: #16a34a18; color: var(--green); }
      .meta-type.topic { background: #d9770618; color: var(--amber); }
      .meta-type.synthesis { background: #7c3aed18; color: var(--purple); }
      .meta-date { font-size: 10px; color: var(--text-muted); }
      .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
      .tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: var(--surface-hover); color: var(--text-secondary); }
      .tag-clickable { cursor: pointer; transition: all 0.15s; }
      .tag-clickable:hover { background: var(--accent); color: #fff; }
      .tag-btn {
        font-size: 10px; padding: 3px 8px; border-radius: 999px;
        background: var(--surface-hover); color: var(--text-secondary);
        transition: all 0.15s; cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      }
      .tag-btn:hover { background: var(--accent); color: #fff; }
      .tag-btn .tag-count {
        font-size: 9px; padding: 0 4px; border-radius: 4px;
        background: rgba(0,0,0,0.08); min-width: 14px; text-align: center;
      }
      .tag-btn:hover .tag-count { background: rgba(255,255,255,0.2); }
      .tag-search-input {
        width: 100%; padding: 6px 10px; font-size: 11px; border-radius: 6px;
        border: 1px solid var(--border); background: var(--surface);
        color: var(--text-primary); outline: none; transition: border-color 0.15s;
      }
      .tag-search-input:focus { border-color: var(--accent); }
      .tag-search-input::placeholder { color: var(--text-muted); }

      /* Floating Table of Contents */
      .toc-float {
        position: fixed; right: max(30px, calc((100vw - 720px - 288px) / 2 - 280px));
        top: 50%; transform: translateY(-50%); z-index: 30;
        display: flex; flex-direction: column; align-items: flex-end;
      }
      .toc-toggle {
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: var(--surface-light); border: 1px solid var(--border);
        color: var(--text-secondary); cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        transition: all 0.15s; position: relative;
      }
      .toc-toggle:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
      .toc-toggle-count {
        position: absolute; top: -6px; right: -6px;
        font-size: 9px; min-width: 16px; height: 16px;
        border-radius: 999px; background: var(--accent); color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-weight: 600;
      }
      .toc-float-body {
        position: absolute; right: 44px; top: 50%; transform: translateY(-50%);
        width: 240px; max-height: 60vh;
        background: var(--surface-light); border: 1px solid var(--border);
        border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        overflow: hidden; display: flex; flex-direction: column;
      }
      .toc-float-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px; font-size: 13px; font-weight: 600;
        color: var(--text-primary); border-bottom: 1px solid var(--border);
      }
      .toc-close {
        font-size: 12px; width: 24px; height: 24px; border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-muted); cursor: pointer;
      }
      .toc-close:hover { background: var(--surface-hover); color: var(--text-primary); }
      .toc-float-nav {
        overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 1px;
        max-height: calc(60vh - 44px);
      }
      .toc-link {
        font-size: 12px; color: var(--text-secondary); text-decoration: none;
        padding: 4px 10px; border-radius: 6px; transition: all 0.1s;
        border-left: 2px solid transparent;
      }
      .toc-link:hover { background: var(--surface); color: var(--accent); }
      .toc-link.toc-active {
        color: var(--accent); font-weight: 600;
        border-left-color: var(--accent);
        background: rgba(180,83,9,0.06);
      }
      .toc-level-2 { }
      .toc-level-3 { padding-left: 22px; font-size: 11px; }
      .toc-level-4 { padding-left: 38px; font-size: 11px; }

      @media (max-width: 1200px) {
        .toc-float { right: 20px; }
        .toc-float-body { right: 48px; width: 200px; }
      }
      @media (max-width: 1023px) {
        .toc-float { right: 16px; }
        .toc-float-body { right: 48px; width: 200px; }
      }

      /* Markdown */
      .md-content h1 { font-size: 24px; font-weight: 600; margin-top: 0; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
      .md-content h2 { font-size: 18px; font-weight: 600; margin-top: 32px; margin-bottom: 12px; color: var(--text-primary); }
      .md-content h3 { font-size: 15px; font-weight: 600; margin-top: 24px; margin-bottom: 8px; color: var(--text-primary); }
      .md-content p { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin: 10px 0; }
      .md-content li { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin: 4px 0 4px 0; }
      .md-content strong { color: var(--text-primary); font-weight: 600; }
      .md-content code { font-size: 12px; background: var(--surface-hover); padding: 2px 6px; border-radius: 4px; color: var(--text-primary); }
      .md-content pre { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; overflow-x: auto; margin: 12px 0; }
      .md-content pre code { background: none; padding: 0; }
      .md-content table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0; }
      .md-content th { padding: 8px 16px; background: var(--surface); color: var(--text-primary); font-weight: 500; text-align: left; }
      .md-content td { padding: 8px 16px; border-top: 1px solid var(--border); color: var(--text-secondary); }
      .md-content blockquote { border-left: 3px solid var(--accent); background: var(--surface-light); padding: 12px 16px; border-radius: 0 8px 8px 0; color: var(--text-secondary); margin: 12px 0; }
      .md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
      .md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
      .md-content .wikilink { color: var(--accent); cursor: pointer; }
      .md-content .wikilink-dead { color: var(--text-muted); cursor: default; }
      .md-content .wikilink:hover { text-decoration: underline; }

      /* Search modal */
      .modal-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.6); display: flex; justify-content: center; padding-top: 15vh; }
      .modal { width: 100%; max-width: 560px; background: var(--surface-light); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.4); overflow: hidden; }
      .modal-input { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
      .modal-input input { flex: 1; background: none; border: none; outline: none; color: var(--text-primary); font-size: 14px; }
      .modal-input input::placeholder { color: var(--text-muted); }
      .modal-results { max-height: 320px; overflow-y: auto; padding: 4px; }
      .modal-result { width: 100%; text-align: left; padding: 10px 12px; border-radius: 8px; transition: all 0.15s; }
      .modal-result:hover, .modal-result.sel { background: #b4530912; }
      .modal-result .rtitle { font-size: 13px; font-weight: 500; color: var(--text-primary); }
      .modal-result .rsnippet { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .modal-empty { padding: 32px; text-align: center; font-size: 13px; color: var(--text-muted); }

      /* Mobile sidebar overlay */
      .mobile-overlay { position: fixed; inset: 0; z-index: 40; }
      .mobile-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); }
      .mobile-overlay-sidebar { position: relative; z-index: 50; height: 100%; width: 288px; }

      /* Status bar */
      .status-bar { display: flex; align-items: center; gap: 16px; padding: 4px 16px; background: var(--surface-light); border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    </style>
    <script type="module" crossorigin src="/assets/index-C_oDqSnY.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
